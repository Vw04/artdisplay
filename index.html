<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    
    let t = 0;
    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, c.width, c.height);
      for(let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(
          c.width/2 + Math.sin(t*0.7+i)*200,
          c.height/2 + Math.cos(t*0.5+i)*150,
          30 + Math.sin(t+i*2)*20,
          0, Math.PI*2
        );
        ctx.fillStyle = `hsla(${t*20+i*60},80%,60%,0.15)`;
        ctx.fill();
      }
      t += 0.02;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
